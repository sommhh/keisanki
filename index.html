<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電卓</title>
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
  padding: 20px;
  color: #fff;
  -webkit-font-smoothing: antialiased;
}
.calculator {
  width: 100%;
  max-width: 380px;
  background: #181818;
  border-radius: 28px;
  box-shadow: 0 25px 60px rgba(0,0,0,.65), 0 2px 8px rgba(0,0,0,.5);
  position: relative;
  padding-bottom: 78px;
  overflow: hidden;
}
.status-bar {
  padding: 14px 22px 0;
  display: flex;
  justify-content: flex-end;
}
#voiceStatus {
  font-size: 12px;
  color: #777;
  letter-spacing: .3px;
  transition: color .2s;
  font-weight: 500;
}
#voiceStatus.on { color: #4ade80; }

.display {
  padding: 12px 22px 10px;
  text-align: right;
}
#expression {
  color: #888;
  font-size: 16px;
  min-height: 22px;
  word-break: break-all;
  font-variant-numeric: tabular-nums;
}
#screen {
  color: #fff;
  font-size: 48px;
  font-weight: 300;
  line-height: 1.15;
  margin: 6px 0 4px;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
  font-variant-numeric: tabular-nums;
}
#screen::-webkit-scrollbar { display: none; }
#history {
  color: #666;
  font-size: 13px;
  min-height: 18px;
  font-variant-numeric: tabular-nums;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 8px 16px 16px;
}
.key {
  background: #222;
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 26px;
  padding: 18px 0;
  cursor: pointer;
  transition: transform .06s ease, filter .15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  font-weight: 400;
}
.key:active { transform: scale(.95); filter: brightness(1.25); }
.key.op { background: #334; }
.key.eq { background: #4a6cf7; color: #fff; font-weight: 500; }
.key.ac { background: #b33; }
.key.fn { background: #2a2a2a; color: #ddd; }
.key.zero { grid-column: span 2; text-align: left; padding-left: 34px; }

#micBtn {
  position: absolute;
  right: 20px;
  bottom: 18px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #252525;
  border: 2px solid #111;
  color: #999;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
  transition: all .2s ease;
  -webkit-tap-highlight-color: transparent;
}
#micBtn:active { transform: scale(.93); }
#micBtn.active {
  background: #4a6cf7;
  color: #fff;
  border-color: #4a6cf7;
  box-shadow: 0 6px 20px rgba(74,108,247,.45);
}
#micBtn svg { width: 24px; height: 24px; }

@media (max-width: 400px) {
  .key { padding: 16px 0; font-size: 24px; border-radius: 14px; }
  #screen { font-size: 44px; }
}
</style>
</head>
<body>
<div class="calculator">
  <div class="status-bar">
    <span id="voiceStatus">音声:OFF</span>
  </div>
  <div class="display">
    <div id="expression"></div>
    <div id="screen">0</div>
    <div id="history"></div>
  </div>
  <div class="buttons">
    <button class="key ac" data-act="ac">AC</button>
    <button class="key fn" data-act="c">C</button>
    <button class="key fn" data-op="%">%</button>
    <button class="key op" data-op="/">÷</button>

    <button class="key" data-num="7">7</button>
    <button class="key" data-num="8">8</button>
    <button class="key" data-num="9">9</button>
    <button class="key op" data-op="*">×</button>

    <button class="key" data-num="4">4</button>
    <button class="key" data-num="5">5</button>
    <button class="key" data-num="6">6</button>
    <button class="key op" data-op="-">−</button>

    <button class="key" data-num="1">1</button>
    <button class="key" data-num="2">2</button>
    <button class="key" data-num="3">3</button>
    <button class="key op" data-op="+">＋</button>

    <button class="key zero" data-num="0">0</button>
    <button class="key" data-num=".">.</button>
    <button class="key eq" data-act="eq">＝</button>
  </div>
  <button id="micBtn" aria-label="音声入力">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
  </button>
</div>

<script>
(() => {
  const screen = document.getElementById('screen');
  const expressionEl = document.getElementById('expression');
  const historyEl = document.getElementById('history');
  const voiceStatus = document.getElementById('voiceStatus');
  const micBtn = document.getElementById('micBtn');

  let current = '0';
  let expr = '';
  let shouldReset = false;
  let voiceOn = false;

  const synth = window.speechSynthesis;
  let voices = [];
  let femaleVoice = null;

  function loadVoices() {
    if (!synth) return;
    voices = synth.getVoices();
    if (!voices.length) return;
    const prefs = ['Kyoko','Haruka','Mizuki','Nanami','Sayaka','Google 日本語','Microsoft Nanami Haruka','Samantha','Google US English'];
    femaleVoice = prefs.map(n => voices.find(v => v.name.includes(n))).find(Boolean) ||
                  voices.find(v => v.lang === 'ja-JP') ||
                  voices.find(v => v.lang.startsWith('ja')) ||
                  voices[0];
  }
  loadVoices();
  if (synth && 'onvoiceschanged' in synth) synth.onvoiceschanged = loadVoices;

  function unlockAudio() {
    if (!synth) return;
    try { const u = new SpeechSynthesisUtterance(''); u.volume = 0; synth.speak(u); } catch(e){}
  }
  document.addEventListener('touchstart', unlockAudio, {once:true});
  document.addEventListener('mousedown', unlockAudio, {once:true});

  function speak(text) {
    if (!voiceOn || !synth) return;
    try {
      synth.cancel();
      const u = new SpeechSynthesisUtterance(text);
      if (femaleVoice) u.voice = femaleVoice;
      u.lang = 'ja-JP';
      u.rate = 1.0;
      u.pitch = 1.2;
      u.volume = 1;
      synth.speak(u);
    } catch(e){}
  }

  const toPretty = s => s.replace(/\*/g,'×').replace(/\//g,'÷').replace(/\+/g,'＋').replace(/-/g,'−');
  
  function formatResult(n) {
    const num = Number(n);
    if (!isFinite(num)) return 'エラー';
    const str = parseFloat(num.toPrecision(12)).toString();
    return str;
  }

  function updateScreen() { screen.textContent = current; }

  function inputNumber(d) {
    unlockAudio();
    if (shouldReset) { current = ''; shouldReset = false; }
    if (d === '.' && current.includes('.')) return;
    if (current === '0' && d !== '.') current = d;
    else if (current === '' && d === '.') current = '0.';
    else current += d;
    updateScreen();
  }

  function inputOperator(op) {
    unlockAudio();
    if (expr && shouldReset) {
      expr = expr.replace(/[+\-*/]$/, op);
    } else {
      expr += current + op;
      shouldReset = true;
    }
    expressionEl.textContent = toPretty(expr);
    current = '0';
    updateScreen();
    shouldReset = true;
  }

  function inputPercent() {
    unlockAudio();
    const val = parseFloat(current) / 100;
    current = formatResult(val);
    updateScreen();
    shouldReset = true;
  }

  function clearAll() {
    unlockAudio();
    current = '0';
    expr = '';
    expressionEl.textContent = '';
    updateScreen();
    shouldReset = false;
  }

  function clearEntry() {
    unlockAudio();
    current = '0';
    updateScreen();
  }

  function calculate() {
    unlockAudio();
    const finalExpr = expr + (shouldReset ? '' : current);
    if (!/^[0-9+\-*/.%() ]+$/.test(finalExpr)) return;
    try {
      const result = Function('"use strict";return (' + finalExpr + ')')();
      const formatted = formatResult(result);
      historyEl.textContent = `${toPretty(finalExpr)} = ${formatted}`;
      expressionEl.textContent = '';
      current = formatted;
      updateScreen();
      expr = '';
      shouldReset = true;
      if (voiceOn) speak(`答えは ${formatted}`);
    } catch(e) {
      screen.textContent = 'エラー';
      current = '0';
      expr = '';
      expressionEl.textContent = '';
      shouldReset = true;
    }
  }

  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('click', () => {
      const num = btn.dataset.num;
      const op = btn.dataset.op;
      const act = btn.dataset.act;
      if (num !== undefined) inputNumber(num);
      else if (op) {
        if (op === '%') inputPercent();
        else inputOperator(op);
      } else if (act) {
        if (act === 'ac') clearAll();
        else if (act === 'c') clearEntry();
        else if (act === 'eq') calculate();
      }
    });
  });

  micBtn.addEventListener('click', () => {
    voiceOn = !voiceOn;
    voiceStatus.textContent = voiceOn ? '音声:ON' : '音声:OFF';
    voiceStatus.classList.toggle('on', voiceOn);
    micBtn.classList.toggle('active', voiceOn);
    unlockAudio();
    loadVoices();
    if (voiceOn) speak('音声オン');
    else if (synth) synth.cancel();
  });

  window.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
    else if (e.key === '.') inputNumber('.');
    else if (e.key === '+') inputOperator('+');
    else if (e.key === '-') inputOperator('-');
    else if (e.key === '*') inputOperator('*');
    else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
    else if (e.key === '%') inputPercent();
    else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calculate(); }
    else if (e.key === 'Backspace') clearEntry();
    else if (e.key === 'Escape') clearAll();
  });

  updateScreen();
})();
</script>
</body>
</html>
