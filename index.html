<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>現場音声電卓 PRO</title>

<meta name="theme-color" content="#0b1020">

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Yu Gothic UI",Meiryo,sans-serif;
  background:#070b16;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
}

body::before{
  content:"";
  position:fixed;
  inset:-20%;
  z-index:-1;
  background:
    radial-gradient(40% 35% at 15% 20%,rgba(99,102,241,.35),transparent 60%),
    radial-gradient(35% 30% at 85% 15%,rgba(236,72,153,.28),transparent 60%),
    radial-gradient(45% 40% at 20% 85%,rgba(56,189,248,.3),transparent 60%);
  filter:blur(40px);
}

.app{
  width:100%;
  max-width:430px;
}

.card{
  background:rgba(15,23,42,.58);
  backdrop-filter:blur(28px);
  border-radius:28px;
  padding:20px;
  border:1px solid rgba(148,163,184,.12);
  box-shadow:0 25px 60px rgba(0,0,0,.55);
}

h1{
  margin:0;
  text-align:center;
  font-size:24px;
  font-weight:900;
  background:linear-gradient(135deg,#93c5fd,#c4b5fd,#f9a8d4);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.sub{
  margin-top:6px;
  text-align:center;
  color:#94a3b8;
  font-size:12px;
}

.display{
  margin-top:16px;
  background:rgba(0,0,0,.35);
  border-radius:20px;
  padding:18px;
  border:1px solid rgba(148,163,184,.1);
  min-height:120px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.display-sub{
  text-align:right;
  color:#94a3b8;
  font-size:13px;
  min-height:18px;
  word-break:break-all;
}

.display-main{
  text-align:right;
  font-size:46px;
  font-weight:800;
  line-height:1.1;
  font-family:ui-monospace,monospace;
  word-break:break-all;
}

.display-main.listening{
  color:#c4b5fd;
}

.display-main.error{
  color:#f87171;
}

.voice-btn{
  width:100%;
  margin-top:14px;
  border:none;
  border-radius:18px;
  padding:16px;
  background:linear-gradient(135deg,#2563eb,#7c3aed,#db2777);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
}

.voice-btn:active{
  transform:scale(.98);
}

.voice-btn.active{
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(168,85,247,.55)}
  70%{box-shadow:0 0 0 18px rgba(168,85,247,0)}
  100%{box-shadow:0 0 0 0 rgba(168,85,247,0)}
}

.controls{
  display:flex;
  justify-content:space-between;
  margin:12px 2px;
  font-size:12px;
}

.status{
  color:#94a3b8;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:9px;
}

.btn{
  border:none;
  border-radius:14px;
  padding:16px 0;
  background:rgba(255,255,255,.05);
  color:#fff;
  font-size:20px;
  cursor:pointer;
  border:1px solid rgba(148,163,184,.1);
}

.btn:active{
  transform:scale(.96);
}

.func{
  color:#a5b4fc;
}

.op{
  color:#f9a8d4;
}

.eq{
  grid-column:span 4;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  font-weight:800;
}

.history{
  margin-top:16px;
  background:rgba(0,0,0,.28);
  border-radius:16px;
  padding:12px;
  max-height:180px;
  overflow:auto;
}

.history h3{
  margin:0 0 8px;
  font-size:12px;
  color:#94a3b8;
}

.history ul{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.history li{
  background:rgba(255,255,255,.04);
  border-radius:10px;
  padding:8px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  cursor:pointer;
  font-size:12px;
  font-family:ui-monospace,monospace;
}

.footer{
  margin-top:12px;
  text-align:center;
  color:#7c8ba1;
  font-size:11px;
  line-height:1.5;
}

.ok{
  color:#22c55e;
  font-weight:700;
}
</style>
</head>

<body>

<div class="app">

<div class="card">

<h1>現場音声電卓 PRO</h1>

<div class="sub">
Android 自動復帰型・ハンズフリー待機
</div>

<div class="display">
<div class="display-sub" id="displaySub"></div>
<div class="display-main" id="displayMain">0</div>
</div>

<button id="voiceBtn" class="voice-btn">
🎤 ハンズフリー開始
</button>

<div class="controls">
<div id="modeLabel">自動復帰モード</div>
<div class="status" id="status">準備完了</div>
</div>

<div class="buttons">

<button class="btn func" data-action="ac">AC</button>
<button class="btn func" data-action="clear">C</button>
<button class="btn func" data-value="(">(</button>
<button class="btn func" data-value=")">)</button>

<button class="btn" data-value="7">7</button>
<button class="btn" data-value="8">8</button>
<button class="btn" data-value="9">9</button>
<button class="btn op" data-value="/">÷</button>

<button class="btn" data-value="4">4</button>
<button class="btn" data-value="5">5</button>
<button class="btn" data-value="6">6</button>
<button class="btn op" data-value="*">×</button>

<button class="btn" data-value="1">1</button>
<button class="btn" data-value="2">2</button>
<button class="btn" data-value="3">3</button>
<button class="btn op" data-value="-">−</button>

<button class="btn" data-value="0">0</button>
<button class="btn" data-value=".">.</button>
<button class="btn func" data-action="back">⌫</button>
<button class="btn op" data-value="+">+</button>

<button class="btn eq" data-action="equals">=</button>

</div>

<div class="history">

<h3>
履歴 <span class="ok">● AUTO RECOVERY</span>
</h3>

<ul id="historyList"></ul>

</div>

<div class="footer">
「3たす5」「たす2」「1000円税込」<br>
「停止」で音声待機終了
</div>

</div>
</div>

<script>
(() => {

"use strict";

const $ = id => document.getElementById(id);

const displayMain = $("displayMain");
const displaySub = $("displaySub");
const voiceBtn = $("voiceBtn");
const statusEl = $("status");
const historyList = $("historyList");

const SR =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

const isAndroid =
  /Android/i.test(navigator.userAgent);

let recognition = null;

let currentExpr = "";
let lastResult = null;
let history = [];

let keepAlive = false;
let listening = false;
let startLock = false;
let restartTimer = null;

let lastStartTime = 0;
let restartCount = 0;

const RESTART_DELAY = 1200;

function vibrate(ms=25){

  try{
    navigator.vibrate?.(ms);
  }catch(e){}
}

function setStatus(text){
  statusEl.textContent = text;
}

function updateDisplay(main,sub=""){

  displayMain.textContent = main || "0";
  displaySub.textContent = sub;

  displayMain.classList.remove("error");
}

function showError(text){

  const old = displayMain.textContent;

  displayMain.textContent = text;

  displayMain.classList.add("error");

  vibrate([60,40,60]);

  setTimeout(()=>{

    displayMain.classList.remove("error");

    displayMain.textContent = old;

  },1500);
}

function escapeHtml(str){

  return String(str).replace(/[&<>"']/g,s=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[s]));
}

function saveHistory(){

  localStorage.setItem(
    "genbaVoiceCalcHistory",
    JSON.stringify(history)
  );
}

function loadHistory(){

  try{

    const h = JSON.parse(
      localStorage.getItem(
        "genbaVoiceCalcHistory"
      ) || "[]"
    );

    if(Array.isArray(h)){
      history = h;
    }

  }catch(e){

    history = [];
  }

  renderHistory();
}

function renderHistory(){

  historyList.innerHTML = "";

  history.forEach(item=>{

    const li = document.createElement("li");

    li.innerHTML = `
      <span>${escapeHtml(item.expr)}</span>
      <span>= ${escapeHtml(String(item.result))}</span>
    `;

    li.onclick = ()=>{

      currentExpr = String(item.result);

      lastResult = item.result;

      updateDisplay(
        String(item.result),
        item.expr + " ="
      );
    };

    historyList.appendChild(li);
  });
}

function addHistory(expr,result){

  history.unshift({expr,result});

  history = history.slice(0,20);

  saveHistory();

  renderHistory();
}

function append(v){

  currentExpr += v;

  updateDisplay(currentExpr);
}

function clearAll(){

  currentExpr = "";

  lastResult = null;

  updateDisplay("0","");

  setStatus("クリア");
}

function clearEntry(){

  currentExpr = "";

  updateDisplay(
    lastResult !== null
      ? String(lastResult)
      : "0"
  );
}

function backspace(){

  currentExpr =
    currentExpr.slice(0,-1);

  updateDisplay(currentExpr || "0");
}

function valid(expr){

  if(!expr) return false;

  expr = expr.replace(/\s+/g,"");

  if(!/^[0-9+\-*/().]+$/.test(expr)){
    return false;
  }

  if(/[+\-*/.(]$/.test(expr)){
    return false;
  }

  if(/\d*\.\d*\./.test(expr)){
    return false;
  }

  return true;
}

function safeEval(expr){

  if(!valid(expr)){
    throw new Error("invalid");
  }

  const result = Function(`
    "use strict";
    return (${expr});
  `)();

  if(!Number.isFinite(result)){
    throw new Error("NaN");
  }

  return result;
}

function calculate(){

  const expr = currentExpr.trim();

  if(!expr){
    return;
  }

  try{

    const result = safeEval(expr);

    lastResult = result;

    currentExpr = String(result);

    updateDisplay(
      String(result),
      expr + " ="
    );

    addHistory(expr,result);

    vibrate(35);

    setStatus("計算完了");

    speakResult(result);

  }catch(e){

    console.error(e);

    showError("計算エラー");

    setStatus("式エラー");
  }
}

function speakResult(result){

  if(!window.speechSynthesis){
    return;
  }

  try{

    speechSynthesis.cancel();

    const uttr =
      new SpeechSynthesisUtterance(
        "答え " + result
      );

    uttr.lang = "ja-JP";

    speechSynthesis.speak(uttr);

  }catch(e){}
}

function normalize(text){

  let s =
    text.toLowerCase();

  if(/停止|ストップ|終了/.test(s)){
    stopHandsFree();
    return "";
  }

  s = s
    .replace(/たす|足す|プラス/g,"+")
    .replace(/ひく|引く|マイナス/g,"-")
    .replace(/かける|掛ける/g,"*")
    .replace(/わる|割る/g,"/")
    .replace(/てん|点/g,".")
    .replace(/税込/g,"*1.1")
    .replace(/[^0-9+\-*/().]/g,"");

  return s;
}

function handleVoice(text){

  const n = normalize(text);

  if(!n){
    return;
  }

  if(
    /^[+\-*/]/.test(n) &&
    currentExpr === "" &&
    lastResult !== null
  ){

    currentExpr =
      String(lastResult) + n;

  }else{

    currentExpr += n;
  }

  updateDisplay(
    currentExpr,
    "音声: " + text
  );

  calculate();
}

async function warmupMic(){

  try{

    const stream =
      await navigator.mediaDevices
      .getUserMedia({
        audio:true
      });

    stream
      .getTracks()
      .forEach(t=>t.stop());

    console.log("mic ready");

  }catch(e){

    console.error(e);

    showError("マイクNG");
  }
}

function startRecognition(){

  if(
    !recognition ||
    startLock
  ){
    return;
  }

  const now = Date.now();

  if(now - lastStartTime < 1000){
    return;
  }

  startLock = true;

  lastStartTime = now;

  try{

    recognition.start();

  }catch(e){

    console.error(e);

  }

  setTimeout(()=>{

    startLock = false;

  },1200);
}

async function beginHandsFree(){

  if(keepAlive){

    stopHandsFree();

    return;
  }

  await warmupMic();

  keepAlive = true;

  restartCount = 0;

  voiceBtn.classList.add("active");

  voiceBtn.textContent =
    "🛑 ハンズフリー停止";

  setStatus("待機中");

  startRecognition();

  vibrate(30);
}

function stopHandsFree(){

  keepAlive = false;

  listening = false;

  clearTimeout(restartTimer);

  voiceBtn.classList.remove("active");

  voiceBtn.textContent =
    "🎤 ハンズフリー開始";

  displayMain.classList.remove("listening");

  try{

    recognition?.stop();

  }catch(e){}

  setStatus("停止");

  vibrate(20);
}

function initSpeech(){

  if(!SR){

    showError("音声非対応");

    setStatus("通常電卓");

    voiceBtn.disabled = true;

    return;
  }

  recognition = new SR();

  recognition.lang = "ja-JP";

  recognition.continuous = false;

  recognition.interimResults = false;

  recognition.maxAlternatives = 1;

  recognition.onstart = ()=>{

    listening = true;

    displayMain.classList.add("listening");

    setStatus("聞き取り中");
  };

  recognition.onaudiostart =
    ()=>console.log("audio");

  recognition.onspeechstart =
    ()=>console.log("speech");

  recognition.onsoundstart =
    ()=>console.log("sound");

  recognition.onresult = e=>{

    const text =
      e.results[0][0]
      .transcript
      .trim();

    console.log("voice",text);

    handleVoice(text);
  };

  recognition.onerror = e=>{

    console.log(
      "speech error",
      e.error
    );

    switch(e.error){

      case "no-speech":
      case "aborted":

        return;

      case "audio-capture":

        setStatus("マイク不可");

        break;

      case "not-allowed":

        setStatus("権限NG");

        keepAlive = false;

        stopHandsFree();

        break;

      case "network":

        setStatus("通信エラー");

        break;

      default:

        setStatus(
          "音声エラー"
        );
    }
  };

  recognition.onend = ()=>{

    listening = false;

    displayMain.classList.remove(
      "listening"
    );

    console.log(
      "onend restart",
      keepAlive
    );

    if(!keepAlive){
      return;
    }

    restartCount++;

    restartTimer = setTimeout(()=>{

      if(keepAlive){

        startRecognition();

      }

    },RESTART_DELAY);
  };
}

function initButtons(){

  document
    .querySelectorAll(".btn")
    .forEach(btn=>{

      btn.onclick = ()=>{

        const action =
          btn.dataset.action;

        const value =
          btn.dataset.value;

        if(action === "ac"){
          clearAll();
          return;
        }

        if(action === "clear"){
          clearEntry();
          return;
        }

        if(action === "back"){
          backspace();
          return;
        }

        if(action === "equals"){
          calculate();
          return;
        }

        if(value){
          append(value);
        }
      };
    });

  voiceBtn.onclick =
    beginHandsFree;
}

function initVisibilityFix(){

  document.addEventListener(
    "visibilitychange",
    ()=>{

      if(
        !document.hidden &&
        keepAlive &&
        !listening
      ){

        setTimeout(()=>{

          startRecognition();

        },1500);
      }
    }
  );
}

function init(){

  loadHistory();

  initButtons();

  initSpeech();

  initVisibilityFix();

  updateDisplay(
    "0",
    navigator.onLine
      ? "オンライン"
      : "オフライン"
  );

  setStatus(
    navigator.onLine
      ? "準備完了"
      : "オフライン"
  );

  console.log(
    "GENBA VOICE CALC READY"
  );
}

init();

})();
</script>

</body>
</html>
