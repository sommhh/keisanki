<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>音声電卓 安定版</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;text-align:center}
.calc{max-width:360px;margin:auto;padding:10px}
#screen{font-size:42px;margin:10px 0}
#expr{font-size:14px;color:#aaa}
button{width:22%;height:60px;margin:1%;font-size:18px;border-radius:10px;border:none}
.op{background:#334}
.func{background:#555}
#mic{width:80px;height:80px;border-radius:50%}
</style>
</head>
<body>

<div class="calc">
<h2>音声電卓 安定版</h2>

<div id="expr"></div>
<div id="screen">0</div>
<div id="status">待機中</div>

<div>
<button class="func" onclick="allClear()">AC</button>
<button class="func" onclick="backspace()">⌫</button>
<button class="func" onclick="input('%')">%</button>
<button class="op" onclick="input('/')">÷</button>

<button onclick="input('7')">7</button>
<button onclick="input('8')">8</button>
<button onclick="input('9')">9</button>
<button class="op" onclick="input('*')">×</button>

<button onclick="input('4')">4</button>
<button onclick="input('5')">5</button>
<button onclick="input('6')">6</button>
<button class="op" onclick="input('-')">−</button>

<button onclick="input('1')">1</button>
<button onclick="input('2')">2</button>
<button onclick="input('3')">3</button>
<button class="op" onclick="input('+')">＋</button>

<button onclick="input('0')">0</button>
<button onclick="input('.')">.</button>
<button id="mic" onclick="startVoice()">🎤</button>
<button onclick="calc()" class="op">＝</button>
</div>

</div>

<script>
// ===== 状態 =====
let current="0";
let tokens=[];

// ===== 表示 =====
function update(){
  document.getElementById("screen").textContent=current;
  document.getElementById("expr").textContent=tokens.join(" ");
}

// ===== 入力 =====
function input(k){

  if(/[0-9]/.test(k)){
    current = current==="0" ? k : current+k;
  }
  else if(k==="."){
    if(!current.includes(".")) current+=".";
  }
  else if(["+","-","*","/","%"].includes(k)){
    tokens.push(parseFloat(current));
    tokens.push(k);
    current="0";
  }

  update();
}

// ===== C =====
function backspace(){
  current = current.length>1 ? current.slice(0,-1) : "0";
  update();
}

// ===== AC =====
function allClear(){
  current="0";
  tokens=[];
  update();
}

// ===== 計算（安全）=====
function calc(){

  tokens.push(parseFloat(current));

  try{
    let result = tokens[0];

    for(let i=1;i<tokens.length;i+=2){
      let op = tokens[i];
      let num = tokens[i+1];

      if(op==="+") result += num;
      if(op==="-") result -= num;
      if(op==="*") result *= num;
      if(op==="/") result /= num;
      if(op==="%") result = result * (num/100);
    }

    current = String(Number(result.toPrecision(10)));
    tokens=[];

  }catch{
    current="0";
  }

  update();
}

// ===== 音声 =====
function startVoice(){

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("音声未対応（iPhoneはSafariで開いて）");
    return;
  }

  const rec = new SR();
  rec.lang="ja-JP";

  rec.onresult=e=>{
    let txt=e.results[0][0].transcript;

    txt = txt.replace(/たす/g,"+")
             .replace(/ひく/g,"-")
             .replace(/かける/g,"*")
             .replace(/わる/g,"/");

    let exp = txt.replace(/[^\d+\-*/]/g,"");

    if(!exp) return;

    try{
      let result = eval(exp);
      current = String(result);
      tokens=[];
    }catch{
      current="0";
    }

    update();
  };

  rec.start();
}

update();
</script>

</body>
</html>
