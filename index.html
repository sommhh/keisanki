<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>音声電卓 v8</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0; background:#0a0a0a; color:#e5e5e5; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;
    display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:20px;
  }
  .calc{
    background:#171717; width:100%; max-width:340px; border-radius:24px; padding:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05); border:1px solid #262626;
  }
  h1{ margin:0 0 10px; text-align:center; font-size:18px; font-weight:600; color:#a3a3a3; letter-spacing:.05em }
  .modes{ display:flex; gap:8px; justify-content:center; margin-bottom:10px }
  .mode{
    padding:6px 14px; border-radius:20px; background:#212121; border:1px solid #333; color:#888;
    font-size:12px; cursor:pointer; transition:.2s;
  }
  .mode.active{ background:#3b82f6; border-color:#3b82f6; color:#fff; font-weight:600 }
  .toggle-wrap{ text-align:center; margin:4px 0 8px }
  #history{ font-size:12px; color:#71717a; text-align:left; margin:8px 4px; min-height:40px; line-height:1.5; font-variant-numeric:tabular-nums }
  #history div{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.9 }
  .display{
    background:#0a0a0a; border-radius:16px; padding:14px 16px; text-align:right; margin:10px 0;
    border:1px solid #262626; min-height:78px; display:flex; flex-direction:column; justify-content:center;
  }
  #expr{ font-size:14px; color:#52525b; min-height:20px; word-break:break-all }
  #current{ font-size:36px; font-weight:200; letter-spacing:.02em; line-height:1.1 }
  #mic{
    width:72px; height:72px; border-radius:50%; background:#212121; border:2px solid #404040;
    font-size:30px; display:block; margin:14px auto 8px; cursor:pointer; transition:.2s; color:#e5e5e5;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
  }
  #mic:active{ transform:scale(.96) }
  #mic.listening{ background:#ef4444; border-color:#fca5a5; animation:pulse 1.4s infinite; color:white }
  @keyframes pulse{ 0%,100%{ transform:scale(1); box-shadow:0 0 0 0 rgba(239,68,68,.5)} 50%{ transform:scale(1.05); box-shadow:0 0 0 12px rgba(239,68,68,0)}}
  #status{ text-align:center; font-size:12px; color:#737373; min-height:18px; margin-bottom:4px }
  .keys{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px }
  .key{
    background:#212121; border:1px solid #2a2a2a; border-radius:14px; color:#e5e5e5;
    font-size:22px; padding:16px 0; cursor:pointer; transition:.1s; font-weight:400;
    touch-action:manipulation;
  }
  .key:active{ transform:scale(.94); background:#2a2a2a }
  .key.op{ background:#262626; color:#f59e0b; font-size:24px }
  .key.eq{ background:#3b82f6; border-color:#3b82f6; color:white; grid-row:span 2; font-size:26px }
  .help{ margin-top:14px; font-size:11px; color:#52525b; text-align:center; line-height:1.4 }
</style>
</head>
<body>
<div class="calc">
  <h1>音声電卓 v8</h1>
  
  <div class="modes">
    <button id="btn-oneshot" class="mode active">ワンショット</button>
    <button id="btn-continuous" class="mode">連続</button>
  </div>
  
  <div class="toggle-wrap">
    <label style="font-size:12px;color:#a3a3a3"><input type="checkbox" id="speakToggle" checked> 読み上げ</label>
  </div>
  
  <div id="history" style="font-size:12px;color:#888;text-align:left;margin:8px;min-height:40px"></div>
  
  <div class="display">
    <div id="expr"></div>
    <div id="current">0</div>
  </div>
  
  <button id="mic" aria-label="マイク">🎤</button>
  <div id="status">マイク停止中</div>
  
  <div class="keys">
    <button class="key" onclick="clearBtn()">C</button>
    <button class="key" onclick="back()">⌫</button>
    <button class="key op" onclick="op('/')">÷</button>
    <button class="key op" onclick="op('*')">×</button>
    
    <button class="key" onclick="input('7')">7</button>
    <button class="key" onclick="input('8')">8</button>
    <button class="key" onclick="input('9')">9</button>
    <button class="key op" onclick="op('-')">−</button>
    
    <button class="key" onclick="input('4')">4</button>
    <button class="key" onclick="input('5')">5</button>
    <button class="key" onclick="input('6')">6</button>
    <button class="key op" onclick="op('+')">+</button>
    
    <button class="key" onclick="input('1')">1</button>
    <button class="key" onclick="input('2')">2</button>
    <button class="key" onclick="input('3')">3</button>
    <button class="key eq" onclick="calc()">＝</button>
    
    <button class="key" style="grid-column:span 2" onclick="input('0')">0</button>
    <button class="key" onclick="input('.')">.</button>
  </div>
  
  <div class="help">「いちたすに」「クリア」「次」など話しかけてください</div>
</div>

<script>
let current="0", expr="", lastResult=null, mode='oneshot', micActive=false, listening=false, recognition=null, history=[];

const $ = id => document.getElementById(id);

function updateDisplay(){
  $('expr').textContent = expr;
  $('current').textContent = current;
}
function setStatus(s){ $('status').textContent = s }

function safeEval(e){
  if(!/^[0-9+\-*/().]+$/.test(e)) throw new Error('invalid');
  return Function('"use strict";return ('+e+')')();
}
function percentFix(s){ return s }

function addHistory(e,r){
  history.unshift(`${e}=${r}`);
  if(history.length>3) history.pop();
  $('history').innerHTML = history.map(h=>`<div>${h}</div>`).join('')
}

function playSound(type){
  try{
    const ctx = window.audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    window.audioCtx = ctx;
    if(ctx.state==='suspended') ctx.resume();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if(type==='click'){o.frequency.value=800; g.gain.setValueAtTime(0.08,ctx.currentTime)}
    else if(type==='success'){o.frequency.value=1200; g.gain.setValueAtTime(0.12,ctx.currentTime)}
    else if(type==='error'){o.frequency.value=280; g.gain.setValueAtTime(0.15,ctx.currentTime)}
    else if(type==='clear'){o.frequency.value=600; g.gain.setValueAtTime(0.09,ctx.currentTime)}
    o.type='sine';
    o.start(); o.stop(ctx.currentTime+0.07);
  }catch(e){}
}

function speak(text){
  if(!$('speakToggle').checked) return;
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=1.0; u.pitch=1.0;
    const voices = speechSynthesis.getVoices();
    let v = voices.find(v=>v.lang==='ja-JP' && /Kyoko|Haruka|Nanami|Mizuki|Sayaka|Tomoko|Female|女性/.test(v.name));
    if(!v) v = voices.find(v=>v.lang==='ja-JP');
    if(v) u.voice=v;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(e){}
}
function speakAnswer(result){ speak(`答えは ${result} です`) }

function clearAll(soft=false){
  current="0"; expr=""; lastResult=null;
  updateDisplay();
  setStatus(soft?'次の計算どうぞ':'クリアしました');
}
function clearBtn(){ clearAll(); playSound('clear'); }

function input(d){
  playSound('click');
  if(d==='.' && current.includes('.')) return;
  if(current==="0" && d!=='.') current=d;
  else current+=d;
  updateDisplay();
}
function op(o){
  playSound('click');
  if(expr && /[+\-*/]$/.test(expr) && current==="0"){
    expr = expr.slice(0,-1)+o;
  }else{
    expr += current + o;
    current="0";
  }
  updateDisplay();
}
function back(){
  playSound('click');
  if(current.length>1) current=current.slice(0,-1);
  else current="0";
  updateDisplay();
}
function calc(){
  playSound('click');
  let full = expr + current;
  if(!full) return;
  if(/[+\-*/.]$/.test(full)){
    setStatus('式が不完全です'); playSound('error'); return;
  }
  try{
    full = percentFix(full);
    const result = safeEval(full);
    addHistory(full, result);
    current = String(result);
    expr=""; lastResult=result;
    updateDisplay();
    playSound('success');
    speakAnswer(result);
    setStatus('計算完了');
  }catch(e){
    setStatus('エラー'); playSound('error');
  }
}

function startVoice(){
  if(listening){
    if(recognition) recognition.stop();
    micActive=false;
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ setStatus('音声認識非対応'); return; }
  
  recognition = new SR();
  recognition.lang='ja-JP';
  recognition.interimResults=false;
  recognition.continuous=false;
  recognition.maxAlternatives=1;
  
  micActive=true; listening=true;
  
  recognition.onstart = ()=>{
    listening=true;
    $('mic').classList.add('listening');
    setStatus('聞いています…');
  };
  
  recognition.onresult = (e)=>{
    const t = e.results[0][0].transcript.trim();
    parseVoice(t);
  };
  
  recognition.onerror = (e)=>{
    setStatus('エラー: '+e.error);
    playSound('error');
  };
  
  recognition.onend = ()=>{
    listening=false;
    $('mic').classList.remove('listening');
    if(micActive && mode==='continuous'){
      setTimeout(()=>{ try{ recognition.start(); }catch(e){} }, 500);
    }else{
      micActive=false;
      setStatus('マイク停止中');
    }
  };
  
  try{ recognition.start(); }catch(e){}
}

function parseVoice(t){
  playSound('click');
  
  if(/(クリア|消去|全消去|消して|言い間違い|いいまちがい|間違えた)/.test(t)){
    clearAll(); playSound('clear'); speak('クリアしました'); return;
  }
  if(/(つぎ|次|クリアして次)/.test(t)){
    clearAll(true); playSound('clear'); setStatus('次の計算どうぞ'); speak('次どうぞ'); return;
  }
  
  let n = t;
  n = n.replace(/たす|足す|プラス/g,'+');
  n = n.replace(/ひく|引く|マイナス/g,'-');
  n = n.replace(/かける|掛ける|✕|×|\*/g,'*');
  n = n.replace(/わる|割る|÷/g,'/');
  n = n.replace(/点|てん/g,'.');
  n = n.replace(/パーセント|ぱーせんと|ぱー|パー/g,'*0.01');
  n = n.replace(/イコール|は|＝|=/g,'');
  n = n.replace(/[　\s]/g,'');
  n = n.replace(/[０-９]/g, s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));
  
  let exprParsed = n.replace(/[^\d+\-*/().]/g,'');
  
  if(!exprParsed || /[+\-*/.]$/.test(exprParsed)){
    setStatus('聞き取れませんでした'); playSound('error'); return;
  }
  
  try{
    exprParsed = percentFix(exprParsed);
    const result = safeEval(exprParsed);
    current = String(result);
    expr=""; lastResult=result;
    updateDisplay();
    addHistory(exprParsed, result);
    playSound('success');
    speakAnswer(result);
    setStatus(`「${t}」→ ${exprParsed}`);
  }catch(e){
    setStatus('計算できません'); playSound('error');
  }
}

function setMode(m){
  mode=m;
  $('btn-oneshot').classList.toggle('active', m==='oneshot');
  $('btn-continuous').classList.toggle('active', m==='continuous');
  if(listening && recognition){
    micActive=false;
    recognition.stop();
  }
  setStatus(m==='oneshot'?'ワンショットモード':'連続モード');
}

$('mic').onclick = startVoice;
$('btn-oneshot').onclick = ()=>setMode('oneshot');
$('btn-continuous').onclick = ()=>setMode('continuous');
$('speakToggle').onchange = ()=>{ if(!$('speakToggle').checked) speechSynthesis.cancel(); };

if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = ()=>{}; speechSynthesis.getVoices(); }

updateDisplay();
setMode('oneshot');
</script>
</body>
</html>
